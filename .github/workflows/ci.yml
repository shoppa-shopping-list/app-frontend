name: CI

on:
  push:
  pull_request:
  merge_group:

jobs:
  checks:
    name: Lint + typecheck + tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Stylelint
        run: npm run stylelint

      - name: Prettier check
        run: npm run format

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:ci
